name: AWS Commercial Canaries

on:
  workflow_dispatch:
  push:

# See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions:
  # required by guardian/actions-riff-raff
  id-token: write
  pull-requests: write
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: CDK Build
        run: pnpm build

      - name: CDK Synth
        run: pnpm synth

      - name: Run script to create zip files
        run: .github/scripts/create-artifacts.sh
        shell: bash

      - uses: guardian/actions-riff-raff@403b5796f8f7e8b8d6cac889e8830e7444ca7058 # v4.3.0
        with:
          projectName: frontend::commercial-canaries
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          roleArn: ${{ secrets.GU_RIFF_RAFF_ROLE_ARN }}
          configPath: cdk.out/riff-raff.yaml
          contentDirectories: |
            upload-eu:
              - builds/tcfv2
            upload-ca:
              - builds/tcfv2
            upload-us:
              - builds/ccpa
            upload-aus:
              - builds/aus
            cdk.out:
              - cdk.out
